name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Ruff (pinned to pre-commit version)
        run: pip install ruff==0.8.4

      - name: Run ruff linter
        run: ruff check --config pyproject.toml .

      - name: Run ruff formatter check
        run: ruff format --config pyproject.toml --check .
